<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Etiquetagem Industrial</title>
  <style>
      body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 20px;
      }
      
      .painel-controle {
          background-color: #f1f1f1;
          padding: 20px;
          border-radius: 5px;
          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      
      .grupo-campos {
          display: flex;
          flex-wrap: wrap;
          justify-content: space-between;
          margin-bottom: 20px;
      }
      
      .grupo-campos .campo {
          flex-basis: 48%;
          margin-bottom: 10px;
      }
      
      .grupo-campos label {
          display: block;
          font-weight: bold;
          margin-bottom: 5px;
      }
      
      .grupo-campos input,
      .grupo-campos select {
          width: 100%;
          padding: 5px;
          border: 1px solid #ccc;
          border-radius: 3px;
      }
      
      .botoes-controle {
          display: flex;
          justify-content: flex-end;
      }
      
      .botoes-controle button {
          background-color: #007bff;
          color: #fff;
          border: none;
          padding: 10px 20px;
          border-radius: 3px;
          cursor: pointer;
          margin-left: 10px;
      }
      
      .campo-upload {
          display: flex;
          align-items: center;
          margin-bottom: 15px;
      }
      
      .campo-upload input[type="file"] {
          flex-grow: 1;
          margin-right: 10px;
      }
      
      .campo-upload button {
          background-color: #007bff;
          color: #fff;
          border: none;
          padding: 5px 10px;
          cursor: pointer;
      }
      
      .etiquetas-container {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
      }
      
      .etiqueta {
          border: 1px solid #ccc;
          padding: 10px;
          margin: 10px;
          width: 25.5mm;
          height: 45.5mm;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
      }
      
      .etiqueta p {
          font-size: 10px;
          margin: 3px 0;
      }
      
      .etiqueta p.fabricado-brasil {
          font-weight: bold;
      }
      
      .etiqueta img {
          max-width: 80px;
          margin-top: 10px;
      }
      
      @media print {
          .painel-controle,
          .botoes-controle {
              display: none;
          }
          
          .etiquetas-container {
              display: grid;
              grid-template-columns: repeat(5, 1fr);
              grid-gap: 10px;
              justify-content: flex-start;
          }
          
          .etiqueta {
              margin: 0;
              page-break-inside: avoid;
          }
      }
  </style>
</head>
<body>
  <div class="painel-controle">
      <div class="grupo-campos">
          <div class="campo">
              <label for="nome-cliente">Nome do Cliente</label>
              <input type="text" id="nome-cliente" placeholder="Digite o nome do cliente">
          </div>
          
          <div class="campo">
              <label for="cnpj">CNPJ</label>
              <input type="text" id="cnpj" placeholder="Digite o CNPJ">
          </div>
          
          <div class="campo">
              <label for="quantidade">Quantidade de Etiquetas</label>
              <input type="number" id="quantidade" placeholder="Digite a quantidade de etiquetas">
          </div>
          
          <div class="campo">
              <label for="ingredientes">Ingredientes</label>
              <input type="text" id="ingredientes" placeholder="Digite os ingredientes">
          </div>
          
          <div class="campo">
              <label for="tamanho">Tamanho</label>
              <input type="text" id="tamanho" placeholder="Digite o tamanho">
          </div>
          
          <div class="campo-upload">
              <input type="file" id="imagem-upload" accept="image/*">
              <button onclick="uploadImagem()">Anexar Imagem</button>
          </div>
      </div>
      
      <div class="botoes-controle">
          <button onclick="gerarEtiquetas()">Gerar Etiquetas</button>
          <button onclick="limparCampos()">Limpar Campos</button>
          <button onclick="imprimirEtiquetas()">Imprimir Etiquetas</button>
      </div>
  </div>

  <div class="etiquetas-container" id="etiquetasContainer"></div>

  <script>
      let imagemAnexada = null;

      function gerarEtiquetas() {
          const nomeCliente = document.getElementById('nome-cliente').value;
          const cnpj = document.getElementById('cnpj').value;
          const quantidade = parseInt(document.getElementById('quantidade').value);
          const ingredientes = document.getElementById('ingredientes').value;
          const tamanho = document.getElementById('tamanho').value;

          // Lógica para gerar as etiquetas
          const etiquetaContainer = document.getElementById('etiquetasContainer');
          etiquetaContainer.innerHTML = '';

          for (let i = 0; i < quantidade; i++) {
              etiquetaContainer.innerHTML += `
                  <div class="etiqueta">
                      <p>${nomeCliente}</p>
                      <p>${cnpj}</p>
                      <p>${ingredientes}</p>
                      <p>${tamanho}</p>
                      <p class="fabricado-brasil">Fabricado no Brasil</p>
                      ${imagemAnexada ? `<img src="${imagemAnexada}" alt="Imagem Anexada">` : ''}
                  </div>
              `;
          }
      }

      function limparCampos() {
          document.getElementById('nome-cliente').value = '';
          document.getElementById('cnpj').value = '';
          document.getElementById('quantidade').value = '';
          document.getElementById('ingredientes').value = '';
          document.getElementById('tamanho').value = '';
          imagemAnexada = null;
      }

      function uploadImagem() {
          const fileInput = document.getElementById('imagem-upload');
          const file = fileInput.files[0];

          if (file) {
              // Aqui você pode enviar a imagem para um servidor ou processá-la de alguma forma
              const imageUrl = URL.createObjectURL(file);
              imagemAnexada = imageUrl;
              console.log('Imagem anexada:', file);
          }
      }

      function imprimirEtiquetas() {
          window.print();
      }
  </script>
</body>
</html>
